name: Planning quality mirror

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-quality:
    name: Links, JSON, privacy, and version drift
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: State documentation authority
        run: echo 'Manual advisory mirror only; local checks are the delivery authority and GitHub status must not block progress.'
      - name: Run dependency-free quality checks
        run: scripts/quality/check.sh
      - name: Verify vendored cross-repository contracts
        run: scripts/contracts/check.sh
